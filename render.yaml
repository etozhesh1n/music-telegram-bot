services:
  - type: worker
    name: music-telegram-bot
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python interactive_bot.py"
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ALLOWED_USERS
        value: ""
      - key: PYTHON_VERSION
        value: 3.11.7
